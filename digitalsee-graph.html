<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="DigitalSEE - Interactive Site Object Knowledge Graph visualization">
<meta name="author" content="DigitalSEE Project">
<title>DigitalSEE - Site Object Graph</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #F4F1EA; color: #3A2E1F; }
    #header {
        padding: 12px 24px;
        background: #6B5500;
        display: flex; align-items: center; justify-content: space-between;
        border-bottom: 2px solid #8A6F1A;
    }
    #header h1 { font-size: 20px; color: #FFFFFF; }
    #header .stats { font-size: 13px; color: #E6D8BD; }
    #controls {
        padding: 8px 24px;
        background: #F7F7F7;
        display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
        border-bottom: 1px solid #D8D2C4;
    }
    #controls label { font-size: 13px; color: #3A2E1F; }
    #controls input[type=checkbox] { margin-right: 4px; }
    .legend {
        display: flex; gap: 16px; flex-wrap: wrap; padding: 4px 0;
    }
    .legend-item {
        display: flex; align-items: center; gap: 4px; font-size: 12px; color: #6F6A5E;
    }
    .legend-dot {
        width: 12px; height: 12px; border-radius: 50%; display: inline-block;
    }
    #graph { width: 100%; height: calc(100vh - 110px); background: #F4F1EA; }
    #search {
        padding: 4px 10px; border-radius: 4px; border: 1px solid #D8D2C4;
        background: #FFFFFF; color: #3A2E1F; width: 220px; font-size: 13px;
    }
</style>
</head>
<body>
<div id="header">
    <h1>DigitalSEE &mdash; Site Object Knowledge Graph</h1>

</div>

var nodesDataset = new vis.DataSet(allNodes);
var edgesDataset = new vis.DataSet(allEdges);

var container = document.getElementById('graph');
var data = { nodes: nodesDataset, edges: edgesDataset };
var options = {
    physics: {
        solver: 'forceAtlas2Based',
        forceAtlas2Based: {
            gravitationalConstant: -40,
            centralGravity: 0.008,
            springLength: 120,
            springConstant: 0.02,
            damping: 0.5,
            avoidOverlap: 0.3
        },
        stabilization: { iterations: 200, fit: true },
        adaptiveTimestep: true,
        maxVelocity: 30,
    },
    nodes: {
        borderWidth: 1,
        borderWidthSelected: 3,
        font: { color: '#3A2E1F', size: 11 },
    },
    edges: {
        width: 0.8,
        smooth: { type: 'continuous', roundness: 0.2 },
        arrows: { to: { enabled: false } },
    },
    interaction: {
        hover: true,
        tooltipDelay: 100,
        navigationButtons: true,
        keyboard: true,
    },
    layout: { improvedLayout: false },
};
var network = new vis.Network(container, data, options);

// Toggling groups
var hiddenGroups = {};
function toggleGroup(group, show) {
    if (show) {
        delete hiddenGroups[group];
    } else {
        hiddenGroups[group] = true;
    }
    var updates = [];
    allNodes.forEach(function(n) {
        if (n.group === group) {
            updates.push({ id: n.id, hidden: !show });
        }
    });
    nodesDataset.update(updates);
    // Also hide edges to/from hidden nodes
    var hiddenIds = new Set();
    nodesDataset.get({ filter: function(n) { return n.hidden; } }).forEach(function(n) { hiddenIds.add(n.id); });
    var edgeUpdates = [];
    allEdges.forEach(function(e) {
        var hide = hiddenIds.has(e.from) || hiddenIds.has(e.to);
        edgeUpdates.push({ id: e.id, hidden: hide });
    });
    edgesDataset.update(edgeUpdates);
}

// Search
function searchNode(query) {
    if (!query || query.length < 2) {
        nodesDataset.update(allNodes.map(function(n) {
            return { id: n.id, opacity: 1.0, font: { color: '#3A2E1F', size: n.font ? n.font.size : 11 } };
        }));
        return;
    }
    var q = query.toLowerCase();
    var matched = [];
    allNodes.forEach(function(n) {
        var hit = (n.label && n.label.toLowerCase().includes(q)) ||
                  (n.id && n.id.toLowerCase().includes(q)) ||
                  (n.title && n.title.toLowerCase().includes(q));
        if (hit) matched.push(n.id);
    });
    var matchSet = new Set(matched);
    nodesDataset.update(allNodes.map(function(n) {
        var isMatch = matchSet.has(n.id);
        return { id: n.id, opacity: isMatch ? 1.0 : 0.15 };
    }));
    if (matched.length > 0 && matched.length <= 5) {
        network.focus(matched[0], { scale: 1.2, animation: true });
    }
}
